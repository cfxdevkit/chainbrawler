<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainBrawler Debug Console</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            margin: 0;
            padding: 20px;
        }
        .console {
            background: #000;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 5px;
            min-height: 400px;
            overflow-y: auto;
        }
        .error { color: #ff4444; }
        .warning { color: #ffaa00; }
        .info { color: #00aaff; }
        .success { color: #44ff44; }
        button {
            background: #333;
            color: #00ff00;
            border: 1px solid #555;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <h1>🔍 ChainBrawler Debug Console</h1>
    <p>This page will help debug runtime errors and module loading issues.</p>
    
    <div>
        <button onclick="testModuleImports()">Test Module Imports</button>
        <button onclick="testFormatDamage()">Test formatDamage</button>
        <button onclick="clearConsole()">Clear Console</button>
        <button onclick="reloadPage()">Reload Page</button>
    </div>
    
    <div class="console" id="console">
        <div class="info">Console ready. Click buttons above to test modules.</div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        function clearConsole() {
            consoleDiv.innerHTML = '<div class="info">Console cleared.</div>';
        }
        
        function reloadPage() {
            window.location.reload();
        }
        
        // Override console methods to capture all output
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };
        
        console.log = (...args) => {
            originalConsole.log(...args);
            log(args.join(' '), 'info');
        };
        
        console.error = (...args) => {
            originalConsole.error(...args);
            log(args.join(' '), 'error');
        };
        
        console.warn = (...args) => {
            originalConsole.warn(...args);
            log(args.join(' '), 'warning');
        };
        
        console.info = (...args) => {
            originalConsole.info(...args);
            log(args.join(' '), 'info');
        };
        
        // Capture unhandled errors
        window.addEventListener('error', (event) => {
            log(`Unhandled Error: ${event.error?.message || event.message}`, 'error');
            if (event.error?.stack) {
                log(`Stack: ${event.error.stack}`, 'error');
            }
        });
        
        // Capture unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            log(`Unhandled Promise Rejection: ${event.reason}`, 'error');
        });
        
        async function testModuleImports() {
            log('Testing module imports...', 'info');
            
            try {
                // Test importing the react-ui module
                log('Attempting to import @chainbrawler/react-ui...', 'info');
                const reactUI = await import('/@fs/workspaces/chainbrawler_dev/packages/react-ui/dist/index.js');
                log('✅ Successfully imported react-ui module', 'success');
                log(`Available exports: ${Object.keys(reactUI).join(', ')}`, 'info');
                
                // Check specifically for formatDamage
                if (reactUI.formatDamage) {
                    log('✅ formatDamage export found', 'success');
                    log(`formatDamage type: ${typeof reactUI.formatDamage}`, 'info');
                } else {
                    log('❌ formatDamage export NOT found', 'error');
                }
                
            } catch (error) {
                log(`❌ Error importing react-ui: ${error.message}`, 'error');
                if (error.stack) {
                    log(`Stack: ${error.stack}`, 'error');
                }
            }
        }
        
        async function testFormatDamage() {
            log('Testing formatDamage function...', 'info');
            
            try {
                const reactUI = await import('/@fs/workspaces/chainbrawler_dev/packages/react-ui/dist/index.js');
                
                if (reactUI.formatDamage) {
                    const result = reactUI.formatDamage(100);
                    log(`✅ formatDamage(100) = ${result}`, 'success');
                } else {
                    log('❌ formatDamage function not available', 'error');
                }
                
            } catch (error) {
                log(`❌ Error testing formatDamage: ${error.message}`, 'error');
            }
        }
        
        // Auto-run tests on page load
        window.addEventListener('load', () => {
            log('Page loaded. Running initial tests...', 'info');
            setTimeout(() => {
                testModuleImports();
            }, 1000);
        });
    </script>
</body>
</html>
